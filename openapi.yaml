openapi: 3.1.0
info:
  title: Mungfali Image Search API
  version: 1.0.0
  description: |
    Affordable image search for developers. Up to 150 results per query in a
    single response — no pagination. SafeSearch, transparent-PNG filtering, and
    structured JSON metadata.
  contact:
    name: Mungfali Support
    email: hello@mungfali.com
    url: https://mungfali.net
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://mungfali.net
    description: Production
security:
  - bearerAuth: []
paths:
  /v1/search:
    get:
      operationId: searchImages
      summary: Search for images
      description: |
        Returns up to 150 image results for the query string `q` in a single
        response. There is no pagination — one request returns the full result set.
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (e.g. "electric car", "mountain sunset").
          schema:
            type: string
            minLength: 1
            example: luxury car
        - name: count
          in: query
          required: false
          description: Maximum number of images to return (1–150). Default is 150.
          schema:
            type: integer
            minimum: 1
            maximum: 150
            default: 150
            example: 150
        - name: safeSearch
          in: query
          required: false
          schema:
            type: string
            enum: [off, moderate, strict]
            default: moderate
        - name: filterTransparent
          in: query
          required: false
          description: When true, exclude images with transparent backgrounds.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful search
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                name: luxury car
                value:
                  - name: Luxury Car Photos, Download The BEST Free Luxury Car Stock Photos & HD ...
                    FamilyFriendly: true
                    imageUrl: https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg?cs=srgb&dl=pexels-mikebirdy-3729464.jpg&fm=jpg
                    hostUrl: https://www.pexels.com/search/luxury%20car/
                    contentSize: 1781235 B
                    width: 5456
                    height: 3632
                    isTransparent: false
                    accentColor: C21C09
        '400':
          description: Invalid request (missing or invalid parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: invalid_request
                  message: Query parameter "q" is required.
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: unauthorized
                  message: Invalid or missing Bearer token.
        '429':
          description: Rate limit or monthly quota exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: rate_limit_exceeded
                  message: Monthly request quota exceeded. Upgrade at https://mungfali.net/pricing
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: internal_error
                  message: An unexpected error occurred. Please retry.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: |
        API key from https://mungfali.net/signup (prefix `mng_`).
        Example: Authorization: Bearer mng_your_api_key
  schemas:
    ImageResult:
      type: object
      required:
        - name
        - imageUrl
        - hostUrl
      properties:
        name:
          type: string
        FamilyFriendly:
          type: boolean
        imageUrl:
          type: string
          format: uri
        hostUrl:
          type: string
          format: uri
        contentSize:
          type: string
        width:
          type: integer
        height:
          type: integer
        isTransparent:
          type: boolean
        accentColor:
          type: string
          description: Hex color without leading #
    SearchResponse:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: Normalized query string
        value:
          type: array
          items:
            $ref: '#/components/schemas/ImageResult'
          description: Up to 150 image results (no pagination)
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
